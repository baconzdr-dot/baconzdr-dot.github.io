<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korobochka — portfolio</title>
    <style>
        body {
            font-family: Verdana, sans-serif;
            background-color: #f5f5f0;
            color: #333;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #4a3c2e;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        button {
            padding: 10px 20px;
            border: none;
            background-color: #e0d8c0;
            color: #333;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }
        button:hover {
            background-color: #d0c8b0;
        }
        button.active {
            background-color: #c0b8a0;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #ccc;
            color: #666;
        }
        a {
            color: #4a3c2e;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Korobochka</h1>

        <div class="tabs">
            <button class="tab-btn active" data-tab="my-art">1. My art</button>
            <button class="tab-btn" data-tab="nsfw-art">2. Nsfw art</button>
        </div>

        <!-- Вкладка "My art" -->
        <div id="my-art" class="tab-content active">
            <h2>My art</h2>
            <div class="gallery">
                <img src="Рисунок 1.jpg" alt="My avatar">
                <img src="Рисунок 2.jpg" alt="My original character - Algor">
                <img src="Рисунок 3.jpg" alt="Human Flattershy">
                <img src="Рисунок 4.jpg" alt="My original character - Algor">
                <img src="Рисунок 6.jpg" alt="This man is mine">
                <img src="Рисунок 7.jpg" alt="My fursona">
                <img src="Рисунок 8.jpg" alt="A furry commision">
            </div>
        </div>

        <!-- Вкладка "Nsfw art" -->
        <div id="nsfw-art" class="tab-content">
            <h2>Nsfw art</h2>
            <div class="gallery">
                <img src="непотребство 1.jpg" alt="A gift for my lovely person">
                <img src="непотребство 2.jpg" alt="Art for an X trend">
            </div>
        </div>

        <footer>
            <p>Do you have a commission? Message me on Telegram!</p>
            <a href="https://t.me/korobochka228">@korobochka228</a>
            <br><br>
            <p>My telegram channel:</p>
            <a href="https://t.me/korobushka228">t.me/korobushka228</a>
        </footer>
    </div>

    <script>
        // Переключение вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // Убираем активный класс у всех кнопок и контента
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                // Активируем выбранную вкладку
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
            });
        });
    </script>
</body>
</html>
