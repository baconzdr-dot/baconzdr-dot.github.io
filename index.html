 <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korobochka — Портфолио</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #4a4a4a;
            background: linear-gradient(135deg, #8B7355 0%, #6B5B4F 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2.5em;
            color: #5D4E37;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #6B5B4F;
            margin-bottom: 20px;
        }

        .contacts {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .contact-item {
            background: #f5f0e8;
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-item a {
            color: #5D4E37;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 2em;
            color: #5D4E37;
            margin-bottom: 20px;
            border-bottom: 2px solid #8B7355;
            padding-bottom: 10px;
        }

        .about {
            font-size: 1.1em;
            line-height: 1.8;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 15px 30px;
            background: #f5f0e8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            color: #5D4E37;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #e8e0d5;
        }

        .tab.active {
            background: #8B7355;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .portfolio {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .portfolio-item {
            background: #f9f9f9;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .portfolio-item:hover {
            transform: translateY(-5px);
        }

        .portfolio-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .portfolio-item h3 {
            padding: 15px;
            color: #4a4a4a;
        }

        .portfolio-item p {
            padding: 0 15px 15px;
            color: #6B5B4F;
        }

        .portfolio-item a {
            display: block;
            padding: 10px 15px;
            background: #8B7355;
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: 5px;
        }

        .portfolio-item a:hover {
            background: #6B5B4F;
        }
