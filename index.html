<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korobochka — portfolio</title>
    <style>
        :root {
            --primary: #8b6914;
            --secondary: #7a5a0f;
            --accent: #4a3c2e;
            --background: #6b5a46;
            --dark: #221a12;
            --light: #f5f5f0;
        }
        body {
            font-family: 'Verdana', sans-serif;
            background-color: var(--background);
            color: var(--dark);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            color: var(--accent);
            margin-bottom: 30px;
            font-size: 2.2rem;
        }
        .channel-info {
            color: var(--dark);
            font-size: 16px;
            margin-bottom: 40px;
        }
        .gallery {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }
        .image-card {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
        }
        .image-title {
            text-align: center;
            padding: 15px 0;
            font-size: 18px; /* Увеличен размер шрифта */
            color: var(--light);
            background-color: var(--dark);
            margin: 0; /* Убираем отступы */
            font-weight: bold; /* Делаем текст жирным */
        }
        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #ccc;
            color: var(--dark);
        }
        a {
            color: var(--dark);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: #1a1511;
        }
        .modal-img {
            max-width: 100%;
            max-height: calc(100vh - 100px);
            border-radius: 6px;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Korobochka</h1>
        <p class="channel-info">My telegram channel: <a href="https://t.me/korobushka228" target="_blank">t.me/korobushka228</a></p>

        <div id="my-art" class="tab-content active">
            <h2>My art</h2>
            <div class="gallery">
                <div class="image-card" onclick="openModal('Рисунок 1.jpg', 'My avatar')">
                    <img src="Рисунок 1.jpg" alt="My avatar">
                    <div class="image-title">My avatar</div>
                </div>
                <div class="image-card" onclick="openModal('Рисунок 2.jpg', 'My original character - Algor')">
                    <img src="Рисунок 2.jpg" alt="My original character - Algor">
                    <div class="image-title">My original character - Algor</div>
                </div>
                <div class="image-card" onclick="openModal('Рисунок 3.jpg', 'Human Flattershy')">
                    <img src="Рисунок 3.jpg" alt="Human Flattershy">
                    <div class="image-title">Human Flattershy</div>
                </div>
                <div class="image-card" onclick="openModal('Рисунок 4.jpg', 'My original character - Algor')">
                    <img src="Рисунок 4.jpg" alt="My original character - Algor">
                    <div class="image-title">My original character - Algor</div>
                </div>
                <div class="image-card" onclick="openModal('Рисунок 6.jpg', 'This man is mine')">
                    <img src="Рисунок 6.jpg" alt="This man is mine">
                    <div class="image-title">This man is mine</div>
                </div>
                <div class="image-card" onclick="openModal('Рисунок 7.jpg', 'My fursona')">
                    <img src="Рисунок 7.jpg" alt="My fursona">
                    <div class="image-title">My fursona</div>
                </div>
                <div class="image-card" onclick="openModal('Рисунок 8.jpg', 'A furry commission')">
                    <img src="Рисунок 8.jpg" alt="A furry commission">
                    <div class="image-title">A furry commission</div>
                </div>
            </div>
        </div>

        <footer>
            <p>Do you have a commission? Message me on Telegram!</p>
            <a href="https://t.me/korobochka228" target="_blank">@korobochka228</a>
        </footer>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <img class="modal-img" id="modal-image">
        </div>
    </div>

    <script>
        // Открытие модального окна
        function openModal(src, title) {
            document.getElementById('modal-image').src = src;
            document.getElementById('modal').style.display = 'flex';

            // Плавное увеличение до оригинального размера
            const img = document.querySelector('.modal-img');
            img.style.transform = 'scale(0)';
            requestAnimationFrame(() => {
                img.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                img.style.transform = 'scale(1)';
            });
        }

        // Закрытие модального окна
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Закрытие по клику вне изображения
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
